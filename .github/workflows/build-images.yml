name: Build and Push Container Images

on:
  push:
    branches: [main]
    paths:
      - '*/Dockerfile'
      - '*/environment.yml'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false  # If one env fails, keep building the others
      matrix:
        env_name:
          - hovernet
          - scist
          - stimage310
          - loki_env
          - path2space310

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.env_name }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.env_name }}
          file: ./${{ matrix.env_name }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.env_name }}:latest
          cache-from: type=gha,scope=${{ matrix.env_name }}
          cache-to: type=gha,scope=${{ matrix.env_name }},mode=max
